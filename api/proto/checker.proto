syntax = "proto3";

package checker;

option go_package = "api/proto/checker";

service VulnerabilityChecker {
    rpc CheckConfig(CheckRequest) returns (CheckResponse);
}

message CheckRequest {
    bytes data = 1;            
}

message CheckResponse {
    repeated Vulnerability vulnerabilities = 1;
}

message Vulnerability {    
    string level = 1;        
    string recommendation = 2;      
}
